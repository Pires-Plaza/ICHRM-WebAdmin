<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICHRM Admin</title>
  <script type="importmap">
  {
    "imports": {
      "firebase/app":      "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js",
      "firebase/auth":     "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js"
    }
  }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-card">
      <h1>ICHRM Admin</h1>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" />
      </div>
      <button id="sign-in-btn" class="btn-primary">Sign In</button>
      <p id="auth-error" class="error"></p>
    </div>
  </div>

  <!-- ── App ───────────────────────────────────────────────── -->
  <div id="app" hidden>
    <header class="app-header">
      <span class="logo">ICHRM Admin</span>
      <div class="header-right">
        <span id="user-email" class="user-email"></span>
        <button id="sign-out-btn" class="btn-sm">Sign Out</button>
      </div>
    </header>

    <div class="main-layout">
      <nav class="sidebar">
        <button class="nav-item active" data-section="authors">&#128100; Authors</button>
        <button class="nav-item"        data-section="papers">&#128196; Papers</button>
        <button class="nav-item"        data-section="sessions">&#128197; Sessions</button>
        <button class="nav-item"        data-section="info">&#128203; Info</button>
        <button class="nav-item"        data-section="settings">&#9881; Settings</button>
      </nav>

      <main class="content">
        <div id="view" class="view"></div>
      </main>
    </div>
  </div>

  <!-- ── Detail modal ──────────────────────────────────────── -->
  <div id="detail-backdrop" hidden>
    <div class="detail-card">
      <div class="detail-header">
        <h2 id="detail-title"></h2>
        <button id="detail-close" title="Close">&#10005;</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
